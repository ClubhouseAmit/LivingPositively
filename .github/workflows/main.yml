name: "Build production artifacts"
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PATH: android/app/
      KEYSTORE_FILE: Maztzilonkey.jks
      FIREBASE_OPTIONS_PATH: lib/util/Firebase/firebase_options.dart
      AAB_PATH: build/app/outputs/bundle/release/app-release.aab
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export secrets as env vars
        uses: oNaiPs/secrets-to-env-action@v1
        with:
          secrets: ${{ toJSON(secrets) }}
      - name: Write key store file for release signing
        run: |
          echo "$APPSIGNINGKEY" | base64 --decode > "${{ env.KEYSTORE_PATH }}${{ env.KEYSTORE_FILE }}"

      - name: Write firebase options file
        run: |
          echo "$FIREBASE_OPTIONS" | base64 --decode > "${{ env.FIREBASE_OPTIONS_PATH }}"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "adopt"
          java-version: "17.x"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests with coverage
        run: flutter test --coverage --reporter=expanded
      - name: Snapshot base lcov before dart-define run
        # The next `flutter test` invocation overwrites coverage/lcov.info;
        # snapshot the full-suite lcov so we can merge the dart-define
        # variant on top of it via scripts/merge_lcov.dart. See
        # docs/adr/ADR-001-phase-6-test-coverage-integration-tests.md.
        run: cp coverage/lcov.info coverage/lcov.base.info
      - name: Run AnalyticsService tests with MIXPANEL_PROJECT_TOKEN dart-define
        # Phase 6 (ADR-001): MixPanelService.init / trackEvent post-init
        # branches are gated on a non-empty
        # String.fromEnvironment('MIXPANEL_PROJECT_TOKEN'). This second test
        # invocation exercises only the AnalyticsService token-present
        # branches with the env var set; the standard suite already covered
        # the empty-token short-circuit branches in the run above.
        run: |
          flutter test --coverage \
            --dart-define=MIXPANEL_PROJECT_TOKEN=test-token \
            test/AnalyticsService/MixPanelService_token_test.dart
          cp coverage/lcov.info coverage/lcov.token.info
      - name: Merge lcov artifacts
        run: dart run scripts/merge_lcov.dart coverage/lcov.info coverage/lcov.base.info coverage/lcov.token.info
      - name: Enforce coverage gate
        run: dart run scripts/check_coverage.dart
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION_LINE=$(grep '^version: ' pubspec.yaml)
          VERSION_STRING=${VERSION_LINE#version: }
          echo "VERSION_STRING=$VERSION_STRING" >> $GITHUB_ENV

      - name: Parse version components
        run: |
          VERSION_NO_BUILD="${VERSION_STRING%%+*}"
          echo "VERSION_NO_BUILD=$VERSION_NO_BUILD" >> $GITHUB_ENV
      - name: Get short commit hash
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

      - name: Set build name and number
        run: |
          BUILD_NAME="${VERSION_NO_BUILD}+${COMMIT_HASH}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Build App Bundle
        env:
          MIXPANEL_PROJECT_TOKEN: ${{ secrets.MIXPANEL_PROJECT_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter build appbundle --release \
            --build-name="${BUILD_NAME}" \
            --build-number="${BUILD_NUMBER}" \
            --dart-define=MIXPANEL_PROJECT_TOKEN="$MIXPANEL_PROJECT_TOKEN" \
            --dart-define=SENTRY_DSN="$SENTRY_DSN"

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ env.AAB_PATH }}

      # - name: Build APK
      #   run: flutter build apk --release
      # - name: Upload APK
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: app-release-apk
      #     path: ${{ env.APK_PATH }}

  integration-test:
    # Phase 7 (ADR-002): per-file coverage gate for the integration_test/
    # suite. Runs on an Android emulator via reactivecircus/android-emulator-runner.
    # Decoupled from build-android — emulator-class flake here cannot pull
    # the unit pipeline's 82% global floor below threshold.
    runs-on: ubuntu-latest
    env:
      FIREBASE_OPTIONS_PATH: lib/util/Firebase/firebase_options.dart
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export secrets as env vars
        uses: oNaiPs/secrets-to-env-action@v1
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: Write firebase options file
        run: |
          echo "$FIREBASE_OPTIONS" | base64 --decode > "${{ env.FIREBASE_OPTIONS_PATH }}"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "adopt"
          java-version: "17.x"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          # Notes on the script below:
          #
          # 1. Single-line `flutter test` invocation — earlier attempts used
          #    YAML `|` block + bash `\<newline>` continuations, which got
          #    re-interpreted by the action's `sh -c` invocation and produced
          #    "Integration tests and unit tests cannot be run in a single
          #    invocation." The single-line form is the canonical pattern
          #    used by reactivecircus's own Flutter examples.
          #
          # 2. `-d emulator-5554` explicitly targets the emulator the action
          #    booted (port 5554 is the default; matches the action's
          #    `emulator-port: 5554` default). Without `-d`, Flutter
          #    occasionally fails to auto-detect the device, leaving
          #    `flutter test` to walk the path as host-VM unit tests, which
          #    triggers the same mix-error because integration_test files
          #    use IntegrationTestWidgetsFlutterBinding.
          #
          # 3. `flutter devices` runs first as a diagnostic — its output
          #    appears in CI logs above any subsequent failure, so the
          #    emulator-visibility question is answered without re-running.
          #
          # 4. SENTRY_DSN is a synthetic, non-routable test value — it makes
          #    `_sentryDsn.isEmpty` false in logger_service.dart so
          #    integration_test/logger_init_test.dart exercises the
          #    `SentryFlutter.init` path + its catch branch. The Sentry
          #    native SDK is channel-mocked in the test so no real network
          #    traffic leaves the runner (PR #266 review, baz-reviewer
          #    finding 1).
          #
          # 5. The iOS-only notifications_schedule_ios_test.dart is excluded
          #    here. The macOS integration-test-ios job owns that file; running
          #    the whole integration_test/ directory on Android mixes iOS
          #    method-channel assumptions with the Android plugin stack.
          script: |
            flutter devices
            flutter test integration_test/custom_categories_e2e_test.dart integration_test/bootstrap_smoke_test.dart integration_test/bootstrap_full_test.dart integration_test/wellness_player_test.dart integration_test/logger_init_test.dart integration_test/notifications_schedule_test.dart --coverage --coverage-path coverage/integration.info --dart-define=SENTRY_DSN=https://test@dsn.example.local/0 -d emulator-5554

      - name: Enforce integration-test per-file coverage floors
        run: dart run scripts/check_integration_coverage.dart

      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-lcov
          path: coverage/integration.info

  integration-test-ios:
    # Phase 10A (ADR-005 § A) ORIGINALLY made this a required input to the
    # aggregate coverage gate. ADR-006 §"Quality gate shape" downgrades it
    # to TELEMETRY-ONLY — `continue-on-error: true` on the test step and
    # the per-file floor step make the job green-on-failure, and the job
    # is NO LONGER in `coverage-aggregate.needs`. This mirrors the
    # `unit-test-web-telemetry` treatment in the same workflow.
    #
    # Rationale: the optimized job still runs on the critical path's
    # slowest hardware (macOS + simulator + native iOS build). Keeping it
    # blocking would stall every PR on macOS-runner availability and
    # simulator/Xcode flakes. The iOS lcov was only ever additive to the
    # union floor (max hit-count per line), so removing it from the
    # aggregate input set cannot lower the 89% floor's safety margin.
    #
    # ADR-006 benchmarks this job on macos-15 arm64: it still provides
    # Xcode 16 / iOS 18 SDK symbols required by flutter_contacts' iOS
    # Contacts limited-permission support without forcing the newer
    # macos-26 / Xcode 26 toolchain onto this coverage job. macOS runners
    # are free for public repositories under GitHub's open-source billing,
    # so the ADR-002 / Round-9 macOS-cost framing that previously deferred
    # iOS coverage no longer applies.
    #
    # The job continues to:
    #   1. Run `notifications_schedule_ios_test.dart` on the iOS simulator.
    #   2. Compute per-file lcov for the iOS arms of NotificationsService.
    #   3. Evaluate scripts/check_ios_integration_coverage.dart (60% floor
    #      on lib/pages/notifications/notification_service.dart) as
    #      JOB-INTERNAL telemetry — its failure no longer blocks the
    #      workflow.
    #   4. Upload `coverage-integration-ios-lcov` and `ios-podfile-lock`
    #      artifacts for PR reviewers and ADR-006 §Podfile.lock follow-up.
    #
    # Re-flipping to blocking: drop the two `continue-on-error: true`
    # lines below AND re-add `integration-test-ios` to
    # `coverage-aggregate.needs` AND restore the iOS branch in
    # check_aggregate_coverage.dart.
    runs-on: macos-15
    env:
      FIREBASE_OPTIONS_PATH: lib/util/Firebase/firebase_options.dart
      IOS_PODS_CACHE_VERSION: v1
      IOS_DERIVED_DATA_CACHE_VERSION: v1
      # cloud_firestore 6.4.1's SwiftPM manifest allows firebase-ios-sdk
      # 12.14.0, whose Firestore pipeline bridge changed initializer
      # signatures. Keep this iOS coverage job on the CocoaPods path until
      # FlutterFire updates cloud_firestore's iOS parser for that API.
      FLUTTER_SWIFT_PACKAGE_MANAGER: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export secrets as env vars
        uses: oNaiPs/secrets-to-env-action@v1
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: Write firebase options file
        run: |
          echo "$FIREBASE_OPTIONS" | base64 --decode > "${{ env.FIREBASE_OPTIONS_PATH }}"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Capture Xcode version for cache keys
        id: xcode
        run: |
          xcodebuild -version
          XCODE_CACHE_KEY=$(xcodebuild -version | tr '\n' '-' | sed -E 's/-$//' | tr ' ' '_')
          echo "cache_key=$XCODE_CACHE_KEY" >> "$GITHUB_OUTPUT"

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: ${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.cache_key }}-ios-pods-${{ env.IOS_PODS_CACHE_VERSION }}-${{ hashFiles('pubspec.lock', 'ios/Podfile', 'ios/Podfile.lock', '.flutter-plugins-dependencies') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.cache_key }}-ios-pods-${{ env.IOS_PODS_CACHE_VERSION }}-

      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.cache_key }}-ios-deriveddata-${{ env.IOS_DERIVED_DATA_CACHE_VERSION }}-${{ hashFiles('pubspec.lock', 'ios/Podfile', 'ios/Podfile.lock', '.flutter-plugins-dependencies', 'ios/Runner.xcodeproj/project.pbxproj', 'ios/Runner.xcworkspace/contents.xcworkspacedata') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.cache_key }}-ios-deriveddata-${{ env.IOS_DERIVED_DATA_CACHE_VERSION }}-

      - name: List available iOS simulators
        # Diagnostic: surfaces the runtime + device names available on the
        # macos-15 image. If the next step fails to find an iPhone, the
        # output here is the first place to look.
        run: xcrun simctl list devices available

      - name: Boot iPhone simulator
        # macos-15 images ship with multiple iPhone simulators.
        # — pick the first "iPhone " device that is available. Avoid pinning
        # to a specific model so the job survives when GitHub rotates the
        # default Xcode/iOS-runtime bundle.
        run: |
          DEVICE_LINE=$(xcrun simctl list devices available | grep -E '^\s+iPhone ' | head -n 1)
          DEVICE_ID=$(echo "$DEVICE_LINE" | awk -F '[()]' '{print $2}')
          DEVICE_NAME=$(echo "$DEVICE_LINE" | sed -E 's/^\s+//; s/ \(.*//')
          if [ -z "$DEVICE_ID" ]; then
            echo "::error::No iPhone simulator found on this macos-15 runner."
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator: $DEVICE_NAME ($DEVICE_ID)"
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
          xcrun simctl boot "$DEVICE_ID"
          # bootstatus blocks until the sim is fully booted (springboard up).
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Run iOS integration test
        # Notes on the invocation below (mirrors the Android job's design
        # rationale in the integration-test job above):
        #
        # 1. Single-line `flutter test` — no `\<newline>` continuations.
        # 2. `-d "$DEVICE_ID"` explicitly targets the booted simulator. Without
        #    `-d`, Flutter sometimes falls back to host-VM mode which
        #    re-triggers "Integration tests and unit tests cannot be run in a
        #    single invocation."
        # 3. SENTRY_DSN dart-define is a synthetic test value — Sentry's
        #    native SDK never reaches the network because the channel is
        #    mocked inside the test setUp. Symmetric with the Android job.
        # 4. We run ONLY `notifications_schedule_ios_test.dart` here, not the
        #    whole `integration_test/` directory. The other integration tests
        #    (bootstrap_smoke, wellness_player, logger_init,
        #    notifications_schedule) are Android-targeted and have no value
        #    on iOS. Running them on iOS would either pass tautologically
        #    (because they use debugDefaultTargetPlatformOverride) or fail
        #    due to Android-specific channel-mock assumptions.
        # `continue-on-error: true` is INTENTIONAL — see job-level comment.
        # Failures here are telemetry, not gating. Do not remove without
        # also re-adding integration-test-ios to coverage-aggregate.needs
        # and restoring the iOS branch in check_aggregate_coverage.dart.
        continue-on-error: true
        run: |
          flutter devices
          flutter test integration_test/notifications_schedule_ios_test.dart --no-pub --coverage --coverage-path coverage/integration_ios.info --dart-define=SENTRY_DSN=https://test@dsn.example.local/0 -d "$DEVICE_ID"

      - name: Upload iOS Podfile lockfile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-podfile-lock
          path: ios/Podfile.lock
          if-no-files-found: warn

      - name: Enforce iOS per-file coverage floor (telemetry — non-blocking)
        # `continue-on-error: true` is INTENTIONAL — see job-level comment.
        # The per-file floor is preserved as job-internal signal so PR
        # reviewers can spot iOS-coverage regressions in the workflow log,
        # but it does not gate the workflow until ADR-006's runtime
        # objective is met and the job is re-promoted to blocking.
        continue-on-error: true
        run: dart run scripts/check_ios_integration_coverage.dart

      - name: Upload iOS integration coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-ios-lcov
          path: coverage/integration_ios.info
          if-no-files-found: warn

  unit-test-web-telemetry:
    # Phase 10C (ADR-005 § C): TELEMETRY-ONLY web-test job — NOT YET A GATE.
    #
    # This job exists to surface the failure modes of running the unit
    # suite under `flutter test --platform chrome`. Once those failures
    # are triaged and the suite is green under Chrome, this job will be
    # renamed to `unit-test-web`, lose `continue-on-error: true` and the
    # `if: always()` upload, gain a real gate step (e.g. a
    # `scripts/check_web_coverage.dart`), and be wired into the
    # `coverage-aggregate` job's `needs:` list so its lcov merges into
    # the aggregate floor.
    #
    # Until that flip happens, this job is **deliberately green-on-failure**:
    #   1. `continue-on-error: true` on the test step makes a `flutter test`
    #      crash report job-success.
    #   2. The job is NOT in `coverage-aggregate`'s `needs:` list, so a
    #      missing/empty `coverage/lcov.info` cannot block the aggregate.
    #
    # This is intentional. Adding web to the aggregate before the suite is
    # green would either skip-on-failure (unsafe under branch protection)
    # or block all PRs on web flakes. The job's value during this phase is
    # the `coverage-web-lcov` artifact + the test-step log, both of which
    # PR reviewers can inspect to file triage issues.
    #
    # Tracking issue: see § "Still deferred (post Phase 10)" in
    # docs/coverage-status.md.
    runs-on: ubuntu-latest
    env:
      FIREBASE_OPTIONS_PATH: lib/util/Firebase/firebase_options.dart
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export secrets as env vars
        uses: oNaiPs/secrets-to-env-action@v1
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: Write firebase options file
        run: |
          echo "$FIREBASE_OPTIONS" | base64 --decode > "${{ env.FIREBASE_OPTIONS_PATH }}"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests on Chrome (telemetry — failures do NOT fail this job)
        # `--platform chrome` compiles the test/ suite via dart2js and runs
        # under headless Chrome. SENTRY_DSN dart-define is the same synthetic
        # value the other jobs use; the AnalyticsService dart-define-merge
        # variant (Phase 6 / ADR-001) is NOT re-run here — that file is
        # already covered by the Android unit job's lcov.
        #
        # `continue-on-error: true` is INTENTIONAL during the triage phase
        # (see job-level comment). Do not remove it without also wiring
        # this job into coverage-aggregate's needs: list and adding a real
        # gate step below.
        continue-on-error: true
        run: |
          flutter test --platform chrome --coverage --dart-define=SENTRY_DSN=https://test@dsn.example.local/0

      - name: Upload web coverage report (telemetry — may be missing or stale)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web-lcov
          path: coverage/lcov.info
          # Do not fail the upload if the file is missing (it will be when
          # `flutter test --platform chrome` crashes before emitting lcov).
          if-no-files-found: warn

  coverage-aggregate:
    # Phase 8 (ADR-003): aggregate coverage gate — merges unit lcov and
    # integration lcov, enforces 85% global floor on the union.
    #
    # `if: ${{ always() }}` + explicit dependency-result check (first step
    # below) is deliberate: with bare `needs:` alone, GitHub Actions skips
    # this job when either upstream fails, and a SKIPPED required check
    # can be treated as "success" by branch protection rules, allowing a
    # PR with a failed upstream to merge with the aggregate gate looking
    # green. The `always()` pattern forces this job to run on every PR;
    # the first step then fails fast when either dependency did not
    # succeed, so the job's status is ALWAYS one of {success, failure} —
    # never "skipped" — and branch protection treats it correctly.
    #
    # The existing gates are UNCHANGED:
    #   build-android → check_coverage.dart          (82% unit floor)
    #   integration-test → check_integration_coverage.dart  (per-file floors)
    # This job is purely additive; removing it restores the Phase 7 state.
    runs-on: ubuntu-latest
    # ADR-006 §"Quality gate shape": integration-test-ios was REMOVED from
    # this set when the iOS job was downgraded to telemetry. The iOS lcov
    # was additive to the union floor (max hit-count per line), so its
    # removal cannot lower the 89% safety margin. Re-add iOS here if the
    # job is re-promoted to blocking.
    needs: [build-android, integration-test]
    if: ${{ always() }}
    steps:
      - name: Verify all upstream jobs succeeded
        # Fail fast if any dependency did not succeed. We check the
        # `result` outputs explicitly rather than relying on `needs:` to
        # skip — see job-level comment above for why a skipped required
        # check is unsafe under branch protection.
        run: |
          build_result="${{ needs.build-android.result }}"
          intg_result="${{ needs.integration-test.result }}"
          echo "build-android result:        $build_result"
          echo "integration-test result:     $intg_result"
          if [ "$build_result" != "success" ]; then
            echo "::error::Upstream job build-android did not succeed (result=$build_result); cannot compute aggregate coverage." >&2
            exit 1
          fi
          if [ "$intg_result" != "success" ]; then
            echo "::error::Upstream job integration-test did not succeed (result=$intg_result); cannot compute aggregate coverage." >&2
            exit 1
          fi
          echo "All upstream jobs succeeded — proceeding with aggregate merge."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Download unit coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage

      - name: Download integration coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration-lcov
          path: coverage

      - name: Merge unit and Android-integration lcov files
        # Merges coverage/lcov.info (unit) and coverage/integration.info
        # (Android intg) into coverage/aggregate.info by taking the max
        # hit-count per line — same semantics as the ADR-001 Phase-6 merge
        # step. Output path is distinct from all inputs so no upstream
        # gate is clobbered.
        #
        # ADR-006 §"Quality gate shape": coverage/integration_ios.info is
        # NO LONGER merged here. The iOS job is telemetry-only and not in
        # this job's needs: list, so the artifact may be absent or stale.
        # Restore the iOS input alongside re-promoting the iOS job.
        run: dart run scripts/merge_lcov.dart coverage/aggregate.info coverage/lcov.info coverage/integration.info

      - name: Enforce aggregate coverage gate
        # check_aggregate_coverage.dart reads coverage/lcov.info and
        # coverage/integration.info directly (parseLcovInputs), applies the
        # same exclude list as check_coverage.dart, and enforces the 89%
        # aggregate global floor (originally 85% under ADR-003 Phase 8;
        # ratcheted to 89% by ADR-004 Phase 9 after the firestore-injection
        # extension in firebase_functions.dart pushed unit-only coverage
        # to 89.33% — see docs/coverage-status.md § Round 9).
        #
        # ADR-006 §"Quality gate shape": the iOS lcov was a third input
        # under ADR-005 § A (Phase 10A) but is no longer merged here while
        # the iOS job is telemetry-only. Removing an additive input cannot
        # lower the union; the 89% floor stays safe.
        run: dart run scripts/check_aggregate_coverage.dart

      - name: Upload aggregate coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-aggregate-lcov
          path: coverage/aggregate.info

  build-web:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      FIREBASE_OPTIONS_PATH: lib/util/Firebase/firebase_options.dart
      WEB_BUILD_PATH: build/web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export secrets as env vars
        uses: oNaiPs/secrets-to-env-action@v1
        with:
