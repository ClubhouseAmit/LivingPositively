org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
android.enableR8.fullMode=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
# Workaround for Flutter 3.44 + Kotlin Gradle Plugin on Windows: when PUB_CACHE
# lives on a different drive than the project, Kotlin's incremental cache
# trips IllegalArgumentException in Path.relativize ("this and base files have
# different roots") for every plugin under build/<plugin>/kotlin/. CI runs on
# Linux/macOS and is unaffected; cold builds there don't benefit from
# incremental anyway. Revisit when Flutter ships a fix.
kotlin.incremental=false
